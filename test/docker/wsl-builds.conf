# Test harness: copied to isolated $HOME as .wsl-builds.conf by builder-tests.bats setup (or via WSL_BUILDS_CONF).
# The builder sources WSL_BUILDS_CONF when set, else "${HOME}/.wsl-builds.conf".
CACHE_DIR=/tmp/wsl-builds/container-cache
WARN_IF_CACHED_FILE_OLDER_THAN=1
# EXTERNAL_BUILDS_ROOT=/mnt/c/my-builds

WIN_HOME_SYMLINK=/tmp/win-home-sl
WIN_HOME_TARGET=/tmp/win-home-target

CODE_HOME_SYMLINK=/tmp/code-home-sl
CODE_HOME_TARGET=/tmp/code-home-target

STYLEGAN3_PKL_CACHE=/tmp/wsl-builds/stylegan3-pkls
STYLEGAN3_PYTORCH_CACHE=/tmp/wsl-builds/stylegan3-pytorch

OLLAMA_MODELS=/tmp/wsl-builds/ollama-models
